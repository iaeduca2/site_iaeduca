name: Validate Tools Data

on:
  push:
    branches: [main, develop]
    paths:
      - 'data/tools.json'
      - 'scripts/validate-tools.js'
  pull_request:
    branches: [main, develop]
    paths:
      - 'data/tools.json'
      - 'scripts/validate-tools.js'
  workflow_dispatch:

jobs:
  validate:
    name: Validate tools.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: ✅ Run validation
        run: node scripts/validate-tools.js

      - name: 💬 Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Tools validation failed**\n\nPlease fix the errors in `data/tools.json` before merging. Check the validation log above for details.'
            })
